<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>OUN ART — Гипсовый декор</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/1998/1998628.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; background: #fefaf5; color: #2c2418; line-height: 1.4; scroll-behavior: smooth; }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }

        .top-bar { background: #fff5eb; border-bottom: 1px solid #f0e4d4; padding: 8px 0; position: sticky; top: 0; z-index: 1000; background: rgba(255, 245, 235, 0.98); backdrop-filter: blur(4px); }
        .top-bar .container { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .social-links { display: flex; gap: 20px; }
        .social-links a { color: #6b5a48; text-decoration: none; font-size: 0.9rem; display: inline-flex; align-items: center; gap: 6px; transition: 0.2s; }
        .social-links a:hover { color: #c26e3c; }
        .top-buttons { display: flex; gap: 16px; }
        .cart-link { background: #f5ede4; padding: 4px 14px; border-radius: 40px; cursor: pointer; font-size: 0.85rem; font-weight: 500; display: flex; align-items: center; gap: 6px; border: 1px solid #e7d9ce; transition: 0.2s; }
        .cart-link:hover { background: #e9dfd4; }
        .cart-count { background: #c26e3c; color: white; border-radius: 40px; padding: 0 6px; font-size: 0.7rem; margin-left: 4px; }

        .hero { text-align: center; padding: 60px 0 40px; }
        .hero h1 { font-size: 5rem; font-weight: 700; color: #9c6e42; letter-spacing: 2px; margin-bottom: 12px; }
        .hero p { font-size: 1.6rem; color: #b29272; font-weight: 400; }
        .hero .btn-catalog { background: #9c6e42; color: white; border: none; padding: 14px 48px; border-radius: 60px; font-size: 1.2rem; font-weight: 600; margin-top: 32px; cursor: pointer; transition: 0.2s; }

        .top-section { padding: 40px 0; background: #fff8f0; }
        .section-title { font-size: 2rem; font-weight: 600; margin-bottom: 32px; border-left: 6px solid #c6a27a; padding-left: 20px; }
        .top-grid { display: flex; gap: 24px; justify-content: center; flex-wrap: wrap; }
        .top-item { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 6px 16px rgba(0,0,0,0.05); cursor: pointer; transition: 0.2s; flex: 1; min-width: 200px; max-width: 300px; aspect-ratio: 1 / 1; display: flex; flex-direction: column; }
        .top-item:hover { transform: translateY(-4px); }
        .top-img { background: #f9f2ea; flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .top-img img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }
        .top-item:hover .top-img img { transform: scale(1.02); }
        .top-title { padding: 12px; text-align: center; font-weight: 600; background: white; font-size: 1rem; border-top: 1px solid #f0e2d4; }

        .catalog-section { padding: 40px 0; background: #fefaf5; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 30px; }
        .product-card { background: white; border-radius: 24px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.05); border: 1px solid #f0e2d4; transition: 0.25s; cursor: pointer; }
        .product-card:hover { transform: translateY(-5px); }
        .product-img { background: #f9f2ea; height: 220px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .product-img img { width: 100%; height: 100%; object-fit: cover; }
        .product-info { padding: 16px; }
        .product-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 6px; }
        .product-price { font-weight: 800; font-size: 1.3rem; color: #9c6e42; }

        .product-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .product-modal.active { display: flex; }
        .modal-content { background: white; max-width: 600px; width: 90%; border-radius: 32px; padding: 24px; max-height: 85vh; overflow-y: auto; position: relative; }
        .modal-close { position: absolute; top: 12px; right: 16px; font-size: 28px; cursor: pointer; background: #9c6e42; color: white; border: none; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10; transition: 0.2s; }
        .modal-close:hover { background: #7e5735; transform: scale(1.05); }
        .modal-img-container { position: relative; text-align: center; margin-top: 8px; }
        .modal-img { width: 100%; max-height: 300px; object-fit: contain; border-radius: 20px; background: #f9f2ea; }
        .modal-prev, .modal-next { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.6); color: white; border: none; font-size: 24px; cursor: pointer; padding: 8px 12px; border-radius: 50%; transition: 0.2s; }
        .modal-prev:hover, .modal-next:hover { background: rgba(0,0,0,0.8); }
        .modal-prev { left: 10px; }
        .modal-next { right: 10px; }
        .modal-counter { text-align: center; margin: 8px 0; font-size: 0.8rem; color: #6b5a48; }
        .modal-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 12px; }
        .modal-price { font-size: 1.6rem; color: #9c6e42; font-weight: 800; margin-bottom: 16px; }
        .modal-desc { color: #5a4a38; margin-bottom: 24px; line-height: 1.5; }
        .modal-avito { background: #00A550; color: white; text-align: center; display: inline-block; padding: 12px 24px; border-radius: 40px; text-decoration: none; font-weight: 600; width: 100%; }
        .modal-cart { background: #f0e3d8; border: none; width: 100%; padding: 12px; border-radius: 40px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
        .modal-cart .cart-controls { display: flex; align-items: center; gap: 12px; }
        .modal-cart .cart-controls button { background: #c26e3c; color: white; border: none; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-size: 14px; }
        .modal-cart .cart-controls span { font-weight: 600; min-width: 20px; text-align: center; }

        .cart-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .cart-modal.active { display: flex; }
        .cart-content { background: white; max-width: 500px; width: 90%; border-radius: 28px; padding: 20px; max-height: 80vh; overflow-y: auto; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eedbcb; gap: 12px; flex-wrap: wrap; }
        .cart-item-info { flex: 2; }
        .cart-item-controls { display: flex; align-items: center; gap: 12px; }
        .cart-item-controls button { background: #e7dbcf; border: none; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-weight: bold; font-size: 16px; }
        .cart-item-controls .cart-remove { background: #f0cfc3; color: #a5512c; width: auto; padding: 4px 12px; border-radius: 20px; }
        .cart-item-controls span { font-weight: 600; min-width: 24px; text-align: center; }
        .btn-clear { background: #e7dbcf; border: none; padding: 10px; border-radius: 40px; width: 100%; margin-top: 12px; cursor: pointer; }
        .order-form { margin-top: 20px; padding-top: 20px; border-top: 2px solid #eedbcb; }
        .order-form input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #e2cfbf; border-radius: 12px; }
        .order-form button { background: #9c6e42; color: white; border: none; padding: 12px; border-radius: 40px; width: 100%; cursor: pointer; font-weight: bold; }

        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #2c2418; color: white; padding: 10px 20px; border-radius: 60px; z-index: 1100; opacity: 0; transition: 0.2s; }
        .toast.show { opacity: 1; }
        footer { text-align: center; padding: 30px 0; border-top: 1px solid #e7dbcf; color: #8e7a64; margin-top: 20px; }
        @media (max-width: 768px) { .hero h1 { font-size: 3rem; } .hero p { font-size: 1.2rem; } .top-grid { flex-direction: column; align-items: center; } .top-item { max-width: 280px; } }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="container">
        <div class="social-links">
            <a href="https://t.me/Olga_Visitskaya" target="_blank"><i class="fab fa-telegram"></i> @Olga_Visitskaya</a>
            <a href="https://t.me/Oun_art_decor_gipss" target="_blank"><i class="fab fa-telegram"></i> Telegram-канал</a>
            <a href="https://max.ru/u/f9LHodD0cOKbyrKw2lIWFoaYj9ALoSmmzduus5R54bV7pgemeU0VLTGKYzE" target="_blank"><i class="fas fa-users"></i> MAX</a>
        </div>
        <div class="top-buttons">
            <div class="cart-link" id="cartIconBtn"><i class="fas fa-shopping-basket"></i> Корзина <span class="cart-count" id="cartCounter">0</span></div>
        </div>
    </div>
</div>

<div class="hero" id="heroSection">
    <div class="container">
        <h1>OUN ART</h1>
        <p>Заготовки из гипса под роспись для декора</p>
        <button class="btn-catalog" id="catalogBtn">Каталог изделий</button>
    </div>
</div>

<div class="top-section" id="topSection">
    <div class="container">
        <h2 class="section-title">🔥 ТОП ПРОДАЖ</h2>
        <div id="topGrid" class="top-grid"></div>
    </div>
</div>

<div class="catalog-section" id="catalogSection" style="display: none;">
    <div class="container">
        <h2 class="section-title">✨ Наши изделия из гипса</h2>
        <div id="productsGrid" class="products-grid"><div class="loading">Загрузка товаров...</div></div>
    </div>
</div>

<footer><div class="container"><p>🏺 OUN ART — Заготовки из гипса для творчества и вдохновения</p></div></footer>

<div id="productModal" class="product-modal">
    <div class="modal-content">
        <button class="modal-close">&times;</button>
        <div class="modal-img-container">
            <button class="modal-prev" id="modalPrev">❮</button>
            <img id="modalImg" class="modal-img" src="" alt="">
            <button class="modal-next" id="modalNext">❯</button>
        </div>
        <div id="modalCounter" class="modal-counter"></div>
        <div id="modalTitle" class="modal-title"></div>
        <div id="modalPrice" class="modal-price"></div>
        <div id="modalDesc" class="modal-desc"></div>
        <button id="modalCartBtn" class="modal-cart"></button>
        <a id="modalAvitoLink" href="#" target="_blank" class="modal-avito"><i class="fas fa-store"></i> Купить на Авито</a>
    </div>
</div>

<div id="cartModal" class="cart-modal">
    <div class="cart-content">
        <div class="cart-header"><h2>Моя корзина</h2><button id="closeCartBtn" style="float:right; font-size:24px; background:none; border:none;">&times;</button></div>
        <div id="cartItemsContainer">Корзина пуста</div>
        <div id="orderForm" class="order-form" style="display:none;">
            <h3>Оформление заказа</h3>
            <input type="text" id="orderName" placeholder="Ваше имя и фамилия *">
            <input type="email" id="orderEmail" placeholder="Email *">
            <input type="tel" id="orderPhone" placeholder="Телефон *">
            <input type="text" id="orderTelegram" placeholder="Telegram (ник) *">
            <button id="submitOrderBtn">📦 Отправить заказ</button>
        </div>
        <button class="btn-clear" id="clearCartBtn">Очистить корзину</button>
        <button id="checkoutBtn" class="btn-checkout" style="background:#9c6e42; color:white; border:none; padding:10px; border-radius:40px; width:100%; margin-top:12px; cursor:pointer;">✅ Оформить заказ</button>
    </div>
</div>

<div id="toastMsg" class="toast"></div>

<script>
    const TELEGRAM_BOT_TOKEN = "8639109854:AAGfLAsx8p9hCsewCBUBA4vRYLXIhF-2VYM";
    const TELEGRAM_CHAT_ID = "1640384547";
    const DEFAULT_AVITO = "https://www.avito.ru/brands/eb053d7096bb77164298b6f7e5f935a5?src=sharing";
    
    let products = [];
    let cart = [];
    let currentModalProduct = null;
    let currentModalIndex = 0;

    async function loadProducts() {
        try {
            const response = await fetch('products.json');
            if (!response.ok) throw new Error();
            products = await response.json();
        } catch(e) {
            products = [];
        }
        renderProducts();
        renderTopProducts();
        updateModalCartButton();
    }

    function renderProducts() {
        const grid = document.getElementById("productsGrid");
        if (!products.length) { grid.innerHTML = '<div class="loading">Нет товаров</div>'; return; }
        grid.innerHTML = products.map(p => {
            const mainImg = p.images?.[0] || null;
            return `
                <div class="product-card" data-id="${p.id}">
                    <div class="product-img">${mainImg ? `<img src="${mainImg}" alt="${p.name}">` : '<div style="font-size:3rem;">🎨</div>'}</div>
                    <div class="product-info">
                        <div class="product-title">${escapeHtml(p.name)}</div>
                        <div class="product-price">${p.price} ₽</div>
                    </div>
                </div>
            `;
        }).join('');
        document.querySelectorAll(".product-card").forEach(card => {
            card.addEventListener("click", () => {
                const id = parseInt(card.dataset.id);
                const product = products.find(p => p.id === id);
                if (product) openProductModal(product, 0);
            });
        });
    }

    function openProductModal(product, index) {
        currentModalProduct = product;
        currentModalIndex = index;
        const modal = document.getElementById("productModal");
        updateModalImage();
        document.getElementById("modalTitle").innerText = product.name;
        document.getElementById("modalPrice").innerText = `${product.price} ₽`;
        document.getElementById("modalDesc").innerText = product.description || '';
        const avitoLink = product.avito_link || DEFAULT_AVITO;
        document.getElementById("modalAvitoLink").href = avitoLink;
        updateModalCartButton();
        modal.classList.add("active");
    }

    function updateModalCartButton() {
        const btn = document.getElementById("modalCartBtn");
        if (!currentModalProduct) return;
        const cartItem = cart.find(i => i.id === currentModalProduct.id);
        const qty = cartItem ? cartItem.qty : 0;
        
        if (qty > 0) {
            btn.innerHTML = `<span>🛒 В корзине</span><div class="cart-controls"><button class="modal-decr">-</button><span>${qty}</span><button class="modal-incr">+</button></div>`;
            btn.querySelector('.modal-decr')?.addEventListener('click', (e) => {
                e.stopPropagation();
                updateCartQuantity(currentModalProduct.id, -1);
                updateModalCartButton();
                renderCart();
            });
            btn.querySelector('.modal-incr')?.addEventListener('click', (e) => {
                e.stopPropagation();
                updateCartQuantity(currentModalProduct.id, 1);
                updateModalCartButton();
                renderCart();
            });
        } else {
            btn.innerHTML = `<span>🛒 В корзину</span>`;
            btn.onclick = () => {
                addToCart(currentModalProduct);
                updateModalCartButton();
                renderCart();
            };
        }
    }

    function updateCartQuantity(id, delta) {
        const existing = cart.find(i => i.id === id);
        if (existing) {
            const newQty = existing.qty + delta;
            if (newQty <= 0) {
                cart = cart.filter(i => i.id !== id);
            } else {
                existing.qty = newQty;
            }
        } else if (delta > 0) {
            const product = products.find(p => p.id === id);
            if (product) cart.push({ id, name: product.name, price: product.price, qty: 1 });
        }
        saveCart();
        renderCart();
        updateModalCartButton();
        showToast("Корзина обновлена");
    }

    function addToCart(product) {
        updateCartQuantity(product.id, 1);
    }

    function updateModalImage() {
        if (!currentModalProduct) return;
        const images = currentModalProduct.images || [];
        const imgElement = document.getElementById("modalImg");
        const counterElement = document.getElementById("modalCounter");
        if (images.length > 0) {
            imgElement.src = images[currentModalIndex];
            counterElement.innerText = `${currentModalIndex + 1} / ${images.length}`;
        } else {
            imgElement.src = '';
            counterElement.innerText = '0 / 0';
        }
    }

    function nextModalImage() {
        if (!currentModalProduct) return;
        const images = currentModalProduct.images || [];
        if (images.length > 0) {
            currentModalIndex = (currentModalIndex + 1) % images.length;
            updateModalImage();
        }
    }

    function prevModalImage() {
        if (!currentModalProduct) return;
        const images = currentModalProduct.images || [];
        if (images.length > 0) {
            currentModalIndex = (currentModalIndex - 1 + images.length) % images.length;
            updateModalImage();
        }
    }

    function renderTopProducts() {
        const topProducts = products.filter(p => p.top === true).slice(0, 3);
        const container = document.getElementById("topGrid");
        if (!topProducts.length) { container.innerHTML = '<div class="loading">Нет товаров в топе</div>'; return; }
        container.innerHTML = topProducts.map(p => {
            const mainImg = p.images?.[0] || null;
            return `
                <div class="top-item" data-id="${p.id}">
                    <div class="top-img">${mainImg ? `<img src="${mainImg}" alt="${p.name}">` : '<div style="font-size:3rem;">🎨</div>'}</div>
                    <div class="top-title">${escapeHtml(p.name)}</div>
                </div>
            `;
        }).join('');
        document.querySelectorAll(".top-item").forEach(item => {
            item.addEventListener("click", () => {
                const id = parseInt(item.dataset.id);
                const product = products.find(p => p.id === id);
                if (product) openProductModal(product, 0);
            });
        });
    }

    function saveCart() { localStorage.setItem("oun_cart", JSON.stringify(cart)); updateCartCounter(); renderCart(); }
    function updateCartCounter() { document.getElementById("cartCounter").innerText = cart.reduce((s,i) => s + i.qty, 0); }
    
    function renderCart() {
        const container = document.getElementById("cartItemsContainer");
        if (!cart.length) { container.innerHTML = "Корзина пуста"; document.getElementById("orderForm").style.display = "none"; document.getElementById("checkoutBtn").style.display = "block"; return; }
        container.innerHTML = cart.map(i => `
            <div class="cart-item">
                <div class="cart-item-info">
                    <strong>${escapeHtml(i.name)}</strong><br>
                    ${i.price} ₽
                </div>
                <div class="cart-item-controls">
                    <button class="cart-qty-minus" data-id="${i.id}">-</button>
                    <span>${i.qty}</span>
                    <button class="cart-qty-plus" data-id="${i.id}">+</button>
                    <button class="cart-remove" data-id="${i.id}">🗑️ Удалить</button>
                </div>
            </div>
        `).join('');
        
        document.querySelectorAll(".cart-qty-plus").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const id = parseInt(btn.dataset.id);
                updateCartQuantity(id, 1);
            });
        });
        document.querySelectorAll(".cart-qty-minus").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const id = parseInt(btn.dataset.id);
                updateCartQuantity(id, -1);
            });
        });
        document.querySelectorAll(".cart-remove").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const id = parseInt(btn.dataset.id);
                cart = cart.filter(i => i.id !== id);
                saveCart();
                renderCart();
                updateModalCartButton();
                showToast("Товар удален из корзины");
            });
        });
        
        document.getElementById("checkoutBtn").style.display = "block";
        document.getElementById("orderForm").style.display = "none";
    }
    
    function clearCart() { cart = []; saveCart(); renderCart(); updateModalCartButton(); showToast("Корзина очищена"); }
    function showOrderForm() {
        if (!cart.length) { showToast("Корзина пуста"); return; }
        document.getElementById("checkoutBtn").style.display = "none";
        document.getElementById("orderForm").style.display = "block";
    }
    
    async function submitOrder() {
        const name = document.getElementById("orderName").value.trim();
        const email = document.getElementById("orderEmail").value.trim();
        const phone = document.getElementById("orderPhone").value.trim();
        const telegram = document.getElementById("orderTelegram").value.trim();
        if (!name || !email || !phone || !telegram) { showToast("Заполните все поля"); return; }
        const itemsList = cart.map(i => `${i.name} — ${i.price} ₽ x ${i.qty}`).join("\n");
        const totalSum = cart.reduce((sum, i) => sum + (parseFloat(i.price) * i.qty), 0);
        const orderData = { name, email, phone, telegram, items: itemsList, total: `${totalSum} ₽` };
        const message = `🛍 НОВЫЙ ЗАКАЗ!\n\n👤 Имя: ${orderData.name}\n📧 Email: ${orderData.email}\n📞 Телефон: ${orderData.phone}\n💬 Telegram: ${orderData.telegram}\n\n📦 Товары:\n${orderData.items}\n\n💰 Сумма: ${orderData.total}`;
        const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
        try {
            const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: message }) });
            if (response.ok) {
                showToast("✅ Заказ оформлен! Продавец напишет вам и договорится об оплате и доставке");
                cart = []; saveCart(); renderCart();
                document.getElementById("orderForm").style.display = "none";
                document.getElementById("checkoutBtn").style.display = "block";
                document.getElementById("orderName").value = "";
                document.getElementById("orderEmail").value = "";
                document.getElementById("orderPhone").value = "";
                document.getElementById("orderTelegram").value = "";
                updateModalCartButton();
            } else showToast("❌ Ошибка отправки");
        } catch(e) { showToast("❌ Ошибка отправки"); }
    }

    document.getElementById("catalogBtn")?.addEventListener("click", () => {
        const catalog = document.getElementById("catalogSection");
        catalog.style.display = catalog.style.display === "none" ? "block" : "none";
        if (catalog.style.display === "block") catalog.scrollIntoView({ behavior: "smooth" });
    });
    document.getElementById("cartIconBtn")?.addEventListener("click", () => { renderCart(); document.getElementById("cartModal").classList.add("active"); });
    document.getElementById("closeCartBtn")?.addEventListener("click", () => document.getElementById("cartModal").classList.remove("active"));
    document.getElementById("clearCartBtn")?.addEventListener("click", clearCart);
    document.getElementById("checkoutBtn")?.addEventListener("click", showOrderForm);
    document.getElementById("submitOrderBtn")?.addEventListener("click", submitOrder);
    document.querySelector(".modal-close")?.addEventListener("click", () => document.getElementById("productModal").classList.remove("active"));
    document.getElementById("modalPrev")?.addEventListener("click", prevModalImage);
    document.getElementById("modalNext")?.addEventListener("click", nextModalImage);
    window.addEventListener("click", e => { if (e.target === document.getElementById("productModal")) document.getElementById("productModal").classList.remove("active"); });
    
    function escapeHtml(s) { if (!s) return ''; return s.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    function showToast(m) { const t = document.getElementById("toastMsg"); t.innerText = m; t.classList.add("show"); setTimeout(() => t.classList.remove("show"), 3000); }

    loadProducts();
    const savedCart = localStorage.getItem("oun_cart");
    if (savedCart) try { cart = JSON.parse(savedCart); updateCartCounter(); } catch(e) {}
</script>
</body>
